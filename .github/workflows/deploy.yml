name: Deploy to cPanel

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Build Static Site
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: "calcpro-e1dd9"
          NEXT_PUBLIC_FIREBASE_DATABASE_ID: "ai-studio-d5cad48c-3132-4615-96f7-ef198596220d"
          NEXT_PUBLIC_SITE_URL: "https://nepacalc.com"
          NEXT_PUBLIC_FIREBASE_API_KEY: "AIzaSyAUAbGWU1eMw7eePLTG0D1gbQRssGqw6V8"
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: "calcpro-e1dd9.firebaseapp.com"
          NEXT_PUBLIC_FIREBASE_APP_ID: "1:369907965034:web:71504a7c24a9b3690dfe13"
          NEXT_PUBLIC_GA_ID: "G-G78ED8CZ3D"

      - name: Commit built output to repo (for cPanel Git pull)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Force-add the out/ folder even though it's in .gitignore
          git add -f out/
          git add .cpanel.yml
          # Only commit if there are actual changes
          git diff --staged --quiet || git commit -m "ci: update built output [skip ci]"
          git push origin main
